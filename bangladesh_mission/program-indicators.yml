schema: cpi-bangladesh-program-indicators
version: "1.0.0"
maintained_by: "Mohammad Ariful Islam, HPM"
reference_frameworks:
  - WHO 90-90-90 HCV targets
  - Health Sector Cox's Bazar indicator framework
  - CPI M&E Toolkit v2.0

# ════════════════════════════════════════════════════════════════════════════
# HCV PROGRAM INDICATORS
# ════════════════════════════════════════════════════════════════════════════
hcv_indicators:
  target_cascade: "WHO 90-90-90"
  reporting_frequency: Monthly / Quarterly
  dhis2_platform: true

  indicators:
    - id: HCV-01
      name: "HCV Screening Coverage"
      definition: "% of estimated HCV+ population tested for HCV"
      numerator: "Number of individuals tested for HCV (RDT)"
      denominator: "Estimated HCV+ population in target area"
      target: "≥90%"
      cascade_step: "First 90"

    - id: HCV-02
      name: "HCV Diagnosis Rate"
      definition: "% of screened individuals with confirmed HCV diagnosis"
      numerator: "Number of HCV RNA/PCR confirmed positive"
      denominator: "Number screened positive on RDT"
      target: ">85%"

    - id: HCV-03
      name: "Treatment Linkage Rate"
      definition: "% of diagnosed patients linked to DAA treatment"
      numerator: "Number started on DAA treatment"
      denominator: "Number confirmed HCV positive"
      target: "≥90%"
      cascade_step: "Second 90"

    - id: HCV-04
      name: "Treatment Completion Rate"
      definition: "% of patients completing full course of DAA"
      numerator: "Number completed DAA course"
      denominator: "Number started DAA treatment"
      target: "≥95%"

    - id: HCV-05
      name: "SVR Achievement Rate (SVR12)"
      definition: "% of treated patients achieving Sustained Virological Response at 12 weeks"
      numerator: "Number achieving SVR12"
      denominator: "Number completing treatment"
      target: "≥90%"
      cascade_step: "Third 90"

    - id: HCV-06
      name: "Lost to Follow-up Rate (LTFU)"
      definition: "% of enrolled patients lost to follow-up"
      numerator: "Number LTFU"
      denominator: "Total enrolled"
      target: "<10%"

    - id: HCV-07
      name: "Total Patients Enrolled in Care"
      definition: "Cumulative total enrolled in HCV program"
      type: cumulative_count

    - id: HCV-08
      name: "CHW Referral Rate for HCV Screening"
      definition: "Number of individuals referred for HCV screening by CHWs per month"
      type: monthly_count

# ════════════════════════════════════════════════════════════════════════════
# CVD/NCD PROGRAM INDICATORS
# ════════════════════════════════════════════════════════════════════════════
cvd_ncd_indicators:
  reporting_frequency: Monthly / Quarterly

  indicators:
    - id: CVD-01
      name: "Hypertension Screening Coverage"
      definition: "% of adults (≥18 yrs) screened for hypertension"
      target: "≥80% of target population"

    - id: CVD-02
      name: "Diabetes Screening Coverage"
      definition: "% of adults (≥18 yrs) screened for diabetes (FBG/RBG)"
      target: "≥70% of target population"

    - id: CVD-03
      name: "New Hypertension Diagnosis Rate"
      definition: "Number of newly diagnosed hypertensive patients per reporting period"
      type: monthly_count

    - id: CVD-04
      name: "Treatment Enrollment Rate (HTN)"
      definition: "% of diagnosed hypertensive patients enrolled in treatment"
      numerator: "Enrolled in antihypertensive treatment"
      denominator: "Confirmed hypertension diagnosis"
      target: "≥90%"

    - id: CVD-05
      name: "Blood Pressure Control Rate"
      definition: "% of treated hypertensive patients with controlled BP (<140/90 mmHg)"
      target: "≥60%"

    - id: CVD-06
      name: "Medication Adherence Rate"
      definition: "% of patients collecting medication on schedule"
      target: "≥80%"

    - id: CVD-07
      name: "Lost to Follow-up Rate (LTFU)"
      definition: "% of enrolled NCD patients lost to follow-up per reporting period"
      target: "<15%"

    - id: CVD-08
      name: "Total Active NCD Patients"
      definition: "Total patients currently active in CVD/NCD program"
      type: point_in_time_count

    - id: CVD-09
      name: "Referral Rate to Secondary Care"
      definition: "Number of patients referred to higher-level care per month"
      type: monthly_count

# ════════════════════════════════════════════════════════════════════════════
# COMMUNITY OUTREACH / HOP INDICATORS
# ════════════════════════════════════════════════════════════════════════════
hop_indicators:
  reporting_frequency: Weekly / Monthly

  indicators:
    - id: HOP-01
      name: "Total Household Visits"
      definition: "Total number of household visits conducted by CHWs per reporting period"
      type: monthly_count
      target: "[Per workplan target]"

    - id: HOP-02
      name: "Households Reached"
      definition: "Number of unique households visited in reporting period"
      type: monthly_count

    - id: HOP-03
      name: "CHW Referrals Made"
      definition: "Number of referrals made to health post or specialist care by CHWs"
      type: monthly_count

    - id: HOP-04
      name: "Referral Completion Rate"
      definition: "% of CHW referrals resulting in facility visit"
      target: "≥70%"

    - id: HOP-05
      name: "Community Education Sessions"
      definition: "Number of community health education sessions conducted"
      type: monthly_count

    - id: HOP-06
      name: "CHW Supervision Completion Rate"
      definition: "% of scheduled CHW supervision visits completed"
      target: "≥90%"

    - id: HOP-07
      name: "Health Post OPD Attendance"
      definition: "Total patients seen at health post per reporting period"
      type: monthly_count

    - id: HOP-08
      name: "Female Patient Proportion"
      definition: "% of health post patients who are female"
      type: percentage

# ════════════════════════════════════════════════════════════════════════════
# SCABIES MDA INDICATORS (Campaign-specific)
# ════════════════════════════════════════════════════════════════════════════
scabies_mda_indicators:
  campaign_target_population: ~24682
  target_families: ~5188
  target_camps: ["Camp 1W (Blocks A & B)", "Camp 4 (Blocks D & F)"]
  treatment: Permethrin cream (or oral Ivermectin per protocol)
  population_source: "UNHCR March 2026 block-level data"

  indicators:
    - id: MDA-01
      name: "MDA Coverage Rate"
      definition: "% of target population receiving treatment"
      target: "≥85% for effective control"
    - id: MDA-02
      name: "Households Reached"
      definition: "Number of families receiving complete household treatment"
    - id: MDA-03
      name: "Treatment Dose Completion"
      definition: "% receiving correct number of doses per protocol"
    - id: MDA-04
      name: "Adverse Event Rate"
      definition: "Number of reported adverse events per 1000 treated"

# ════════════════════════════════════════════════════════════════════════════
# REPORTING SCHEDULE
# ════════════════════════════════════════════════════════════════════════════
reporting_schedule:
  weekly:
    - EWARS disease surveillance
    - CHW activity count
  monthly:
    - DHIS2 health data
    - ActivityInfo donor platform
    - Internal program reports (all programs)
    - Health post OPD statistics
  quarterly:
    - Donor reports
    - Health Sector 3W/4W
    - M&E assessment
  annually:
    - Annual Program Report
    - Full M&E evaluation

# ════════════════════════════════════════════════════════════════════════════
# INDICATOR PERFORMANCE TABLE FORMAT
# ════════════════════════════════════════════════════════════════════════════
indicator_table_format:
  columns:
    - "#"
    - Indicator
    - "Target (Cumulative)"
    - "Target (Monthly)"
    - "Achieved (Month)"
    - "Achieved (Cumulative)"
    - "% of Monthly Target"
    - Remarks
  formatting:
    header_row: "CPI Purple #41273B background, white Arial Bold 10pt"
    row_on_target: "Light green fill (#E8F5E9)"
    row_below_target: "Light yellow fill (#FFF9C4)"
    row_critical: "Light red fill (#FFEBEE)"
    alternating_rows: ["#FFFFFF", "#D0C4C5 at 30%"]
