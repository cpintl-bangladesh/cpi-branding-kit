geographic_references:
  ukhia_upazila: "Primary location for most refugee camps"
  teknaf_upazila: "Southeastern camps — some smaller settlements"
  cox_bazar_town: "District headquarters — CPI office location (Rabbani Building)"
  kutupalong: "Largest camp complex (~800,000 refugees in adjacent sites)"
  balukhali: "Part of Kutupalong-Balukhali expansion site"

humanitarian_context:
  crisis_type: Protracted refugee displacement
  displacement_origin: Myanmar (Rakhine State)
  un_refugee_status: UNHCR-registered
  resettlement_pace: Extremely limited
  repatriation_status: Suspended / no safe conditions for return (as of 2026)
  ration_cut_wfp_2025: "$6 USD per person per month (halved)"
  fire_risk: Extremely high (bamboo/tarpaulin shelters, dense population)
  flood_monsoon_risk: High (June–October)
  cyclone_risk: Moderate (Bay of Bengal)
  key_challenges:
    - Overcrowding and sanitation deficits
    - Rising food insecurity post-aid cuts
    - Limited freedom of movement
    - Youth unemployment and mental health burden
    - Repatriation uncertainty and protracted displacement
    - Shrinking humanitarian funding

fcn_identifier:
  name: Family Composition Number
  acronym: FCN
  purpose: "Universal patient identifier across Cox's Bazar refugee camps"
  issuing_authority: UNHCR
  structure: "Family-level ID with individual suffix"
  integration: "Core patient identifier in ZarishSphere HIS and all CPI health registries"
  verification_pathway: "UNHCR Data Sharing Arrangement (DSA) required for API access"

cpi_facility:
  uid: HF-418
  system: DHIS2 (via YPSA)
  type: Health Post
  capacity: "Up to 200 patients per day"
  services:
    - General OPD
    - Chronic disease management (HCV, CVD, NCD)
    - Screening programs (HCV, hypertension, diabetes)
    - Referral coordination
    - Emergency first aid
