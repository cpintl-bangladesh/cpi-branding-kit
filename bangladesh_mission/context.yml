# ════════════════════════════════════════════════════════════════════════════
# PROGRAMS
# ════════════════════════════════════════════════════════════════════════════
programs:

  health_outreach_programme:
    code: HOP
    full_name: "Health Outreach Programme"
    description: >
      CHW-based household outreach across refugee camps in Cox's Bazar.
      CHWs serve as first point of contact, providing health education,
      doorstep screening, EPI referrals, ANC/FBD referrals, and hygiene
      distribution. Implemented by YPSA in Camps 1W and 4.
    facility_uid: HF-418
    partner: YPSA

  health_post:
    code: HP
    full_name: "Health Post Program"
    description: >
      Static primary health care facility (UID 418) in Camp 1W, B15 Block
      serving 34,000+ refugees and host community. Services: OPD, emergency
      stabilization, reproductive care, MHPSS, NCD Corner, AMR diagnostics.
    daily_patients: 200
    facility_uid: HF-418
    partner: YPSA

  hcv_program:
    code: HCV
    full_name: "Hepatitis C Virus Program"
    description: >
      WHO 90-90-90 cascade of care: testing, diagnosis, treatment (DAA),
      SVR monitoring. CHW-led community mobilization and follow-up.
      Research partnership with JHU, icddr,b, and RTMI for CVD-HCV cRCT.
    target_cascade:
      test: "90% of estimated HCV+ population"
      link_to_treatment: "90% of diagnosed"
      achieve_svr: "90% of treated"

  cvd_ncd_program:
    code: CVD
    full_name: "CVD/NCD Program"
    description: >
      Systematic screening, diagnosis, treatment, and follow-up for
      hypertension, diabetes, and other non-communicable diseases.
      Cluster randomized controlled trial (cRCT) with JHU and icddr,b
      evaluating CHW-led model for CVD risk reduction.
    key_conditions:
      - Hypertension
      - Diabetes mellitus type 2
      - Asthma/COPD
      - Heart failure
    research_partners: ["JHU", "icddr,b", "RTMI"]

  health_system_strengthening:
    code: HSS
    full_name: "Health System Strengthening Program"
    description: >
      Supporting Sadar Hospital Emergency Department with CPI-YPSA funded
      MBBS Medical Officers, IPC staff, and diagnostic reagents. MoU Phase 10
      (January-December 2026). Partner capacity building and NCD Corner
      integration in Camps 5 and 17 with RTMI.

  wash_clean_energy:
    code: WASH
    full_name: "WASH & Clean Energy Program"
    description: >
      Building disaster-resilient twin-pit latrines, gender-segregated
      bathing cubicles, and solar street lighting in Camps 1W, 4, and 17
      and Cox's Bazar Sadar host communities. In Patuakhali, partnership
      with SDA on WCEP Phase 3: mini-piped water networks, biogas plants,
      and community-led O&M under CPIL social enterprise model.
    partners: ["YPSA", "SDA"]

  education_program:
    code: EDU
    full_name: "Education Program"
    description: >
      Learning for Future (L4F) project in partnership with Educo across
      Camps 1W, 4, and 17. Operating 8 Early Childhood Education (ECE)
      centers, 4 Learning Centers (LCs), and 4 Community-Based Learning
      Facilities (CBLFs) serving 440 learners. Life-skills sessions on
      gender discrimination, child safeguarding, and PSEA training.
    partner: Educo
    learners: 440

  livelihood_alternative_energy:
    code: LIV
    full_name: "Livelihood & Alternative Energy Program"
    description: >
      Household and community-scale biogas plants in Patuakhali host
      communities. Turning organic waste into cooking fuel, reducing
      firewood reliance and deforestation. Community-led water management
      committees creating job opportunities in O&M, billing, and
      infrastructure maintenance.
    partner: SDA

  emergency_preparedness:
    code: EM
    full_name: "Emergency Preparedness"
    description: >
      Community-based disaster response teams trained for rapid response
      to fires, floods, and cyclones in Cox's Bazar camps.

  zarish_sphere_his:
    code: ZARISH
    full_name: "ZarishSphere Health Information System"
    description: >
      National-grade HIS being designed for the Rohingya refugee response.
      FCN as universal patient identifier; DHIS2 integration under YPSA.
    architecture: "Connect+Extend federated model"
    universal_patient_id: FCN
    facility_uid: HF-418
    dhis2_credentials: YPSA
    requirements_checklist_items: 390
    system_domains: 25
    status: "Design phase (2026)"

