# ════════════════════════════════════════════════════════════════════════════
# INFORMATION SYSTEMS
# ════════════════════════════════════════════════════════════════════════════
information_systems:
  dhis2:
    purpose: Health data management
    credentials: YPSA
    reporting_frequency: Monthly
  kobo_toolbox:
    purpose: Field data collection
    language_options: [English, Rohingya]
  activity_info:
    purpose: Donor reporting platform
  ewars:
    purpose: Early Warning and Response System (CDC/WHO)
    reporting_frequency: Weekly
  make_com:
    purpose: Automation workflows (Integromat)
  google_workspace:
    tools: [Sheets, Drive, Looker Studio]
  fcn:
    description: "Family Composition Number"
    role: Universal patient identifier in all camps
    mandatory: true
    issued_by: UNHCR

# ════════════════════════════════════════════════════════════════════════════
# SECTOR COORDINATION
# ════════════════════════════════════════════════════════════════════════════
sector_coordination:
