# ════════════════════════════════════════════════════════════════════════════
# 5-TIER M&E REPORTING ARCHITECTURE
# ════════════════════════════════════════════════════════════════════════════
me_architecture:
  tier_1_community:
    level: "Community Field Level (CHWs)"
    tools: ["CHW Daily Household Visit Log", "RDT Register"]
    data_flow: "Paper forms → Weekly digitization by TAs and Field M&E Volunteers"
  tier_2_clinic:
    level: "Clinic/Health Post Level"
    tools: ["General OPD Registry", "Health Post NCD Register"]
    data_flow: "Daily M&E Officer data entry → Monthly HP Master Data"
  tier_3_program:
    level: "Program Management Level"
    tools: ["Master Patient Line List", "Referral Tracker"]
    data_flow: "M&E Officer + HPM verification on Google Drive and central sheets"
  tier_4_sector:
    level: "Sector and Government Level"
    platforms: ["DHIS2", "EWARS", "ActivityInfo (4W)"]
    data_flow: "Weekly/monthly submissions to WHO, Health Sector, DGHS"
  tier_5_hq:
    level: "Strategic Management/HQ Level"
    outputs: ["Monthly SitReps", "Quarterly Narrative Reports", "Annual ASDR"]
    data_flow: "HPM and Country Director compile for prime donors and MoHFW"

