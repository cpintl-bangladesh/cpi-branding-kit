    phone: "+880 15 3420 6479"
    address: >
      Rabbani Building (4th Floor), Opposite S.K. Tower,
      Kurushkul Bypass Road, Cox's Bazar, Bangladesh
  cpi_global:
    website: https://cpintl.org
    email: info@cpintl.org

# ── File naming patterns ──────────────────────────────────────────────────────
file_naming:
  pattern: "CPI-BGD-{ProgramCode}-{DocumentType}-{YYYYMM}-v{Version}.{ext}"
  program_codes:
    HOP: Health Outreach Programme
    HCV: Hepatitis C Virus Program
    CVD: CVD/NCD Program
    WASH: WASH Services
    HP: Health Post
    EM: Emergency Preparedness
    ADMIN: Administration
    ME: Monitoring and Evaluation
    ZARISH: ZarishSphere HIS
  document_types:
    MonthlyReport: Monthly Program Report
    QReport: Quarterly Donor Report
    AnnualReport: Annual Program Report
    SitRep: Situation Report
    SOP: Standard Operating Procedure
    TrainingManual: Training Manual
    ConceptNote: Concept Note
    MeetingMinutes: Meeting Minutes
    Presentation: Presentation/Slide Deck
    FieldReport: Field Activity Report

# ── Integration hints ─────────────────────────────────────────────────────────
integrations:
  dhis2:
    partner: YPSA
    facility_uid: HF-418
    note: Use YPSA DHIS2 credentials for data entry
  kobo_toolbox:
    use_for: field_data_collection
    language_options: [en, rohingya]
  activity_info:
    use_for: donor_reporting
  ewars:
    use_for: disease_surveillance_weekly
  google_workspace:
    use_for: [sheets, drive, looker_studio]
  make_com:
    use_for: automation_workflows
  fcn:
    description: Family Composition Number
    role: universal_patient_identifier
    mandatory: true
