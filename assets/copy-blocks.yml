# ════════════════════════════════════════════════════════════════════════════
# ORGANIZATIONAL BOILERPLATE
# ════════════════════════════════════════════════════════════════════════════
organizational:

  about_long: |
    Community Partners International (CPI) empowers vulnerable communities in
    Asia affected by conflict, disasters, and poverty to meet their essential
    health, humanitarian, and sustainable development needs. Founded in 1998,
    CPI works in Myanmar, Bangladesh, and Thailand, serving more than three
    million people each year. Ninety-seven percent of CPI's workforce is from
    the countries where we operate. We invest 95% of our expenses in programs
    that directly reach people in need.

  about_short: |
    Community Partners International (CPI) empowers vulnerable communities
    in Asia to meet their essential health, humanitarian, and sustainable
    development needs.

  about_bangladesh_long: |
    Community Partners International has been working in Bangladesh since 2017,
    supporting Rohingya refugees and Bangladeshi host communities. CPI Bangladesh
    provides essential health care, health system strengthening, WASH and clean
    energy, education, and livelihood services through a country office in Dhaka
    and project offices in Cox's Bazar and Patuakhali.

  about_bangladesh_short: |
    CPI Bangladesh has operated in Bangladesh since 2017, delivering essential
    health, WASH, education, and humanitarian services to Rohingya refugees and
    host communities through community health workers, health facilities, local
    partnerships, and emergency response teams.

  mission: |
    Community Partners International empowers vulnerable communities in Asia
    affected by conflict, disasters, and poverty to meet their essential
    health, humanitarian, and sustainable development needs.

  vision: |
    Communities in Southeast Asia have the resources, capacity and information
    necessary to meet their own health, learning and development needs.

  tagline: "Empower communities. Transform lives."

  localization: |
    Empowerment and localization are hardwired into Community Partners
    International. Ninety-seven percent of our workforce is from the countries
    where we operate, and more than 98% is based in those countries.

  efficiency: |
    We invest around 95% of our expenses in programs that directly reach people
    in need, with just 5% used for administration and fundraising.

# ════════════════════════════════════════════════════════════════════════════
# PROGRAM COPY
# ════════════════════════════════════════════════════════════════════════════
programs:

  hop: |
    CPI's Health Outreach Programme (HOP) deploys trained Community Health
    Workers (CHWs) across refugee camps in Cox's Bazar to provide household-level
    health services, education, and referrals. CHWs serve as the first point of
    contact for community members, bridging the gap between the community and
    formal health services.

  health_post: |
    CPI's Health Post provides static primary health care services to Rohingya
    refugees in Cox's Bazar, serving up to 200 patients daily. Services include
    general outpatient care, chronic disease management, screening programs,
    and referral to higher-level facilities.

  hcv: |
    CPI Bangladesh's Hepatitis C program follows the WHO 90-90-90 cascade of
    care approach: testing 90% of the estimated HCV-positive population, linking
    90% of those diagnosed to treatment, and achieving sustained virological
    response (SVR) in 90% of treated patients. Community Health Workers support
    mobilization, follow-up, and adherence within the refugee camp setting.

  cvd_ncd: |
    Non-communicable diseases including hypertension and diabetes are a growing
    burden among Rohingya refugees. CPI's CVD/NCD program provides systematic
    screening, diagnosis, treatment, and follow-up care, helping patients manage
    chronic conditions and reduce risk of life-threatening complications.

  wash: |
    CPI Bangladesh builds and maintains water wells and water networks, toilet
    and washing facilities, and supports hygiene promotion through trained
    community health and hygiene workers — ensuring Rohingya refugees have
    access to safe water and sanitation in one of the world's most densely
    populated humanitarian settings.

  emergency: |
    CPI Bangladesh trains and equips community-based disaster response teams
    to respond to fires, floods, and cyclones — the most frequent emergencies
    in Cox's Bazar camps. Rapid response saves lives and supports community
    recovery in the critical hours after a disaster.

  education: |
    CPI Bangladesh, in partnership with Educo, delivers the Learning for
    Future (L4F) project across Camps 1W, 4, and 17 — operating Early
    Childhood Education centers, Learning Centers, and Community-Based
    Learning Facilities serving 440 learners.

  wash_clean_energy: |
    CPI Bangladesh builds disaster-resilient sanitation infrastructure,
    installs solar street lighting, and supports clean energy solutions in
    refugee camps and host communities through partnerships with YPSA and SDA.

  livelihood: |
    CPI Bangladesh's livelihood program in Patuakhali turns organic waste
    into cooking fuel through community biogas plants, creating local jobs
    and reducing environmental impact.

# ════════════════════════════════════════════════════════════════════════════
# CRISIS CONTEXT
# ════════════════════════════════════════════════════════════════════════════
crisis_context:

  rohingya_background: |
    More than 970,000 Rohingya refugees from Myanmar shelter in Cox's Bazar
    District, Bangladesh — making it one of the world's largest concentrations
    of displaced people. More than half are children. Since the mass displacement
    of August 2017, when more than 740,000 Rohingya fled violence in Myanmar's
    Rakhine State, CPI has worked alongside these communities to provide
    essential services and strengthen their resilience.

  current_severity: |
    Rohingya refugees in Cox's Bazar face worsening conditions: dramatic aid
    cuts, rising population density, increasing food insecurity, and growing
    vulnerability to climate events. The World Food Programme reduced monthly
    rations to $6 per person in early 2025. As resources shrink, community-level
    health services become even more critical.

  host_community: |
    With Rohingya refugees comprising approximately one-third of Cox's Bazar
    District's total population, Bangladeshi host communities also face mounting
    development pressures. CPI supports sustainable water, sanitation, and
    livelihood initiatives that benefit both refugees and their Bangladeshi
    neighbors, promoting peaceful coexistence and shared resilience.

# ════════════════════════════════════════════════════════════════════════════
# DONOR / APPEAL COPY
# ════════════════════════════════════════════════════════════════════════════
donor_appeal:

  urgency_opening: |
    Every day, families in Cox's Bazar refugee camps face extraordinary hardship.
    Food rations have been cut. Aid programs are shrinking. But community health
    workers — supported by your generosity — are still making their rounds, still
    knocking on doors, still providing the care that keeps families healthy.

  impact_statement: |
    With your support, CPI Bangladesh's community health workers make thousands
    of household visits each month, our health post serves up to 200 refugees
    daily, and our CHW network operates across camps in Cox's Bazar — providing
    a lifeline to families who have already lost so much.

  partnership_appeal: |
    Empowerment and localization are at the heart of everything we do. 97% of
    CPI's workforce comes from the countries where we operate. Our local staff
    and community health workers understand the culture, language, and needs of
    the communities they serve. This is why our work endures.

  closing_cta: |
    Your support today empowers communities to build resilient, sustainable
    health systems for a better tomorrow. Empower communities. Transform lives.
    Give now at cpintl.org.

