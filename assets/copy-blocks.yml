report_openers:

  executive_summary: |
    This report covers [Program Name] activities implemented by Community
    Partners International (CPI) in Cox's Bazar, Bangladesh during [Reporting
    Period]. The program serves [target population description] across
    [geographic area], with a focus on [thematic focus].

  context_section: |
    Cox's Bazar District hosts more than 970,000 Rohingya refugees in 33 camps,
    representing one of the world's largest humanitarian crises. [Program name]
    was established in response to [specific need], targeting [specific
    population] in [camps/blocks]. CPI works in close coordination with the
    Health Sector, UNHCR, and local partner YPSA to ensure complementary,
    non-duplicative services.

  challenges_section: |
    Program implementation during [period] encountered several challenges that
    required adaptive management. The following table outlines key challenges,
    their impact on implementation, and mitigation measures taken.

  lessons_learned: |
    The following lessons were identified during [period] and will inform
    implementation in the coming quarter. These learnings are shared with the
    Health Sector and partner organizations to contribute to collective
    improvement across the response.

