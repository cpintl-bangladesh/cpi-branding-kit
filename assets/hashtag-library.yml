usage_rules:
  max_per_post:
    facebook: 5
    linkedin: 5
    instagram: 15
  always_include:
    - "#CPI" OR "#CPIBangladesh"
  caption_placement: "End of caption, after main content"
  never_use:
    - Trending hashtags unrelated to CPI's work
    - Political hashtags
    - Hashtags that could be misinterpreted
